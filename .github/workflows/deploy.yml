name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Once a day, so the blog page picks up new Substack posts without
    # needing a manual push (RSS is fetched at build time, not runtime).
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: node build.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Must match the project name in your Cloudflare Pages dashboard.
          projectName: rodrigo-website
          directory: dist
